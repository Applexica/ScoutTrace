# Hermes Agent configuration
agent_name: hermes-1
log_level: info

mcp_servers:
  filesystem:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/Users/me/code"
  github:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_TOKEN: "ghp_secret_value_should_never_be_copied"

other_section:
  key: unrelated
